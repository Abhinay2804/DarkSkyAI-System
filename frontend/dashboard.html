<!DOCTYPE html>
<html>

<head>

    <title>DarkSky AI Dashboard</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:20px;
            background:#f5f5f5;
        }

        h1,h2{
            text-align:center;
        }

        .stats-container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            width:250px;
            text-align:center;
        }

        .card p{
            font-size:28px;
            font-weight:bold;
        }

        #map{
            height:700px;
            width:100%;
            border:2px solid black;
            border-radius:10px;
            margin-bottom:30px;
            background:transparent !important;
        }

        /* LEAFLET FIXES */

        .leaflet-container{
            height:100%;
            width:100%;
            background:#ddd !important;
        }

        .leaflet-tile-pane{
            opacity:1 !important;
            visibility:visible !important;
            z-index:200 !important;
        }

        .leaflet-tile{
            opacity:1 !important;
            visibility:visible !important;
            display:block !important;
        }

        .leaflet-overlay-pane{
            z-index:300 !important;
        }

        .leaflet-marker-pane{
            z-index:400 !important;
        }

        canvas{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ccc;
            padding:10px;
            text-align:center;
        }

        th{
            background:#222;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

    </style>

</head>

<body>

    <h1>DarkSky AI Dashboard</h1>

    <div class="stats-container">

        <div class="card">
            <h3>Total Uploads</h3>
            <p id="totalUploads">0</p>
        </div>

        <div class="card">
            <h3>Average Pollution</h3>
            <p id="avgPollution">0</p>
        </div>

        <div class="card">
            <h3>Highest Pollution</h3>
            <p id="highestPollution">0</p>
        </div>

    </div>

    <h2>Pollution Heat Map</h2>

    <div id="map"></div>

    <h2>Pollution Trend</h2>

    <canvas id="pollutionChart"></canvas>

    <h2>Upload Records</h2>

    <table id="dataTable">

        <tr>
            <th>Photo</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Upload Time</th>
            <th>Pollution Score</th>
        </tr>

    </table>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <script src="dashboard.js"></script>

</body>

</html>
