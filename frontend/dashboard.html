<!DOCTYPE html>

<html>

<head>


<title>DarkSky AI Dashboard</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

    body{
        font-family: Arial, sans-serif;
        margin:20px;
        background:#f5f5f5;
    }

    h1,h2{
        text-align:center;
    }

    .stats-container{
        display:flex;
        justify-content:center;
        gap:20px;
        flex-wrap:wrap;
        margin-bottom:20px;
    }

    .card{
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 2px 8px rgba(0,0,0,0.2);
        width:320px;
        text-align:center;
    }

    .card p{
        font-size:28px;
        font-weight:bold;
    }

    #map{
        height:500px;
        width:100%;
        border:2px solid black;
        border-radius:10px;
        margin-bottom:30px;
    }

    .chart-container{
        width:100%;
        height:400px;
        background:white;
        padding:20px;
        border-radius:10px;
        margin-bottom:30px;
        box-sizing:border-box;
    }

    #pollutionChart{
        width:100% !important;
        height:100% !important;
    }

    canvas{
        background:white;
        border-radius:10px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:white;
    }

    th,td{
        border:1px solid #ccc;
        padding:10px;
        text-align:center;
    }

    th{
        background:#222;
        color:white;
    }

    tr:nth-child(even){
        background:#f2f2f2;
    }

    a{
        color:blue;
        text-decoration:none;
    }

</style>


</head>

<body>


<h1>DarkSky AI Dashboard</h1>

<div class="stats-container">

    <div class="card">
        <h3>Total Uploads</h3>
        <p id="totalUploads">0</p>
    </div>

    <div class="card">
        <h3>Average Pollution</h3>
        <p id="avgPollution">0</p>
    </div>

    <div class="card">
        <h3>Highest Pollution</h3>
        <p id="highestPollution">0</p>
    </div>

</div>

<h2>Pollution Map</h2>

<div id="map"></div>

<h2>Pollution Trend</h2>

<div class="chart-container">
    <canvas id="pollutionChart"></canvas>
</div>

<h2>Upload Records</h2>

<table id="dataTable">

    <tr>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Upload Time</th>
        <th>Pollution Score</th>
        <th>AQI</th>
        <th>PM2.5</th>
        <th>Status</th>
    </tr>

</table>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="dashboard.js"></script>


</body>

</html>
