<!DOCTYPE html>

<html>

<head>
    <title>DarkSky AI Dashboard</title>

    href="https://unpkg.com/leaflet/dist/leaflet.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

```
<h1>DarkSky AI Dashboard</h1>

<div id="stats">

    <h2>Project Statistics</h2>

    <p><b>Total Records:</b>
        <span id="totalRecords">0</span>
    </p>

    <p><b>Average Score:</b>
        <span id="averageScore">0</span>
    </p>

    <p><b>Highest Score:</b>
        <span id="highestScore">0</span>
    </p>

    <p><b>Lowest Score:</b>
        <span id="lowestScore">0</span>
    </p>

</div>

<table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Pollution Score</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody id="tableBody">

    </tbody>

</table>

<h2>Pollution Trend Chart</h2>

<canvas id="pollutionChart"></canvas>

<h2>Pollution Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

    async function loadRecords() {

        const response =
            await fetch(
                "http://localhost:5000/records"
            );

        const data =
            await response.json();

        const validScores =
            data
            .filter(
                r => r.pollution_score != null
            )
            .map(
                r => r.pollution_score
            );

        document.getElementById(
            "totalRecords"
        ).innerText =
            data.length;

        if (validScores.length > 0) {

            document.getElementById(
                "averageScore"
            ).innerText =
                (
                    validScores.reduce(
                        (a, b) => a + b,
                        0
                    )
                    /
                    validScores.length
                ).toFixed(2);

            document.getElementById(
                "highestScore"
            ).innerText =
                Math.max(...validScores);

            document.getElementById(
                "lowestScore"
            ).innerText =
                Math.min(...validScores);
        }

        const tableBody =
            document.getElementById(
                "tableBody"
            );

        const labels = [];
        const scores = [];

        data.forEach(record => {

            labels.push(
                "ID " + record.id
            );

            scores.push(
                record.pollution_score || 0
            );

            let status = "";

            if (
                record.pollution_score == null
            )
                status = "Not Analyzed";
            else if (
                record.pollution_score < 30
            )
                status = "Dark Sky";
            else if (
                record.pollution_score < 60
            )
                status = "Moderate";
            else
                status = "High Pollution";

            tableBody.innerHTML += `
            <tr>
                <td>${record.id}</td>
                <td>${record.latitude}</td>
                <td>${record.longitude}</td>
                <td>${record.pollution_score}</td>
                <td>${status}</td>
            </tr>
            `;
        });

        // CHART

        const ctx =
            document.getElementById(
                "pollutionChart"
            );

        new Chart(ctx, {

            type: "line",

            data: {

                labels: labels,

                datasets: [
                    {
                        label:
                            "Pollution Score",

                        data: scores,

                        borderWidth: 3,

                        tension: 0.3
                    }
                ]
            },

            options: {

                responsive: true,

                scales: {

                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });

        // MAP

        let centerLat =
            data[0]?.latitude || 18.0156;

        let centerLng =
            data[0]?.longitude || 79.5635;

        const map =
            L.map('map')
                .setView(
                    [centerLat, centerLng],
                    15
                );

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution:
                    '© OpenStreetMap Contributors'
            }
        ).addTo(map);

        const greenIcon =
            new L.Icon({
                iconUrl:
                    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
                shadowUrl:
                    'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
                iconSize: [25, 41]
            });

        const orangeIcon =
            new L.Icon({
                iconUrl:
                    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
                shadowUrl:
                    'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
                iconSize: [25, 41]
            });

        const redIcon =
            new L.Icon({
                iconUrl:
                    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                shadowUrl:
                    'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
                iconSize: [25, 41]
            });

        data.forEach(record => {

            let markerIcon =
                orangeIcon;

            let status =
                "Not Analyzed";

            if (
                record.pollution_score < 30
            ) {

                markerIcon =
                    greenIcon;

                status =
                    "Dark Sky";
            }
            else if (
                record.pollution_score < 60
            ) {

                markerIcon =
                    orangeIcon;

                status =
                    "Moderate";
            }
            else if (
                record.pollution_score >= 60
            ) {

                markerIcon =
                    redIcon;

                status =
                    "High Pollution";
            }

            L.marker(
                [
                    record.latitude,
                    record.longitude
                ],
                {
                    icon:
                        markerIcon
                }
            )
                .addTo(map)
                .bindPopup(
                    `
                    <b>ID:</b>
                    ${record.id}
                    <br>

                    <b>Pollution Score:</b>
                    ${record.pollution_score}
                    <br>

                    <b>Status:</b>
                    ${status}
                    `
                );
        });
    }

    loadRecords();

</script>
```

</body>

</html>
