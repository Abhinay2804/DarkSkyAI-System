<!DOCTYPE html>
<html>
<head>

    <title>DarkSky AI Dashboard</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

</head>
<body>

    <h1>DarkSky AI Dashboard</h1>

    <h2>Pollution Heat Map</h2>

    <div
        id="map"
        style="height:500px;width:100%;"
    ></div>

    <br>

    <table
        border="1"
        id="dataTable"
    >
        <tr>
            <th>Photo</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Upload Time</th>
            <th>Pollution Score</th>
        </tr>
    </table>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="dashboard.js"></script>

</body>
</html>
